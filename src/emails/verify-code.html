<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录验证码</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7;min-height:100vh;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;">

          <!-- Logo 区 -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="font-size:28px;">🔐</span>
            </td>
          </tr>

          <!-- 主卡片 -->
          <tr>
            <td style="background:#ffffff;border-radius:16px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,0.06);">

              <!-- 标题 -->
              <h1 style="margin:0 0 8px;font-size:22px;font-weight:600;color:#1a1a2e;text-align:center;">
                您的登录验证码
              </h1>
              <p style="margin:0 0 28px;font-size:14px;color:#666;text-align:center;line-height:1.6;">
                请使用以下验证码完成登录，<br/>
                该验证码 <strong style="color:#d63031;">{{ttl}} 分钟内</strong> 有效。
              </p>

              <!-- 验证码 -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
                <tr>
                  <td style="background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:16px 40px;letter-spacing:12px;font-size:36px;font-weight:700;color:#ffffff;text-align:center;font-family:Menlo,Consolas,monospace;">
                    {{code}}
                  </td>
                </tr>
              </table>

              <!-- 提示 -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="background:#f8f9fc;border-radius:10px;padding:16px 20px;margin-bottom:0;">
                <tr>
                  <td style="font-size:13px;color:#888;line-height:1.7;">
                    <strong style="color:#555;">⚠️ 安全提示</strong><br/>
                    · 请勿将验证码透露给他人<br/>
                    · 连续输错 3 次验证码将失效<br/>
                    · 如非本人操作，请忽略此邮件
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- 页脚 -->
          <tr>
            <td align="center" style="padding-top:24px;font-size:12px;color:#aaa;line-height:1.6;">
              此邮件由系统自动发送，请勿回复<br/>
              Quick Auth &bull; 安全认证服务
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
