<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页 - Quick Auth</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6fa; min-height: 100vh; display: flex;
      align-items: center; justify-content: center; margin: 0;
    }
    .card { background: #fff; border-radius: 6px; padding: 48px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
    .card h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 8px; }
    .card p { color: #666; margin-bottom: 24px; }
    .email-badge { display: inline-block; background: #f0f4ff; color: #2d6be0; padding: 6px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 24px; }
    .btn-logout { padding: 12px 28px; border: none; border-radius: 4px; background: #d63031; color: #fff; font-size: 15px; cursor: pointer; }
    .btn-logout:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>👋 欢迎回来</h1>
    <div class="email-badge">{{email}}</div>
    <p>您已通过验证码登录成功</p>
    <button class="btn-logout" onclick="logout()">退出登录</button>
  </div>
  <script>
    async function logout() { await fetch('/api/logout', { method:'POST' }); location.href = '/login'; }
  </script>
</body>
</html>
