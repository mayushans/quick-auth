<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - Quick Auth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 6px;
      padding: 40px;
      width: 400px;
      max-width: 92vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .card h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
    .card p.sub { color: #666; margin-bottom: 28px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 14px; font-weight: 500;
      color: #333; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 14px;
      border: 1px solid #ddd; border-radius: 4px;
      font-size: 15px; outline: none; transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: #2c7cb0; box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }
    .code-row { display: flex; gap: 10px; }
    .code-row input { flex: 1; }
    .code-row button {
      width: 120px;
      white-space: nowrap; padding: 12px 18px;
      border: none; border-radius: 4px;
      background: #2c7cb0; color: #fff;
      font-size: 14px; cursor: pointer; transition: opacity .2s;
    }
    .code-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      width: 100%; padding: 13px; border: none; border-radius: 4px;
      background: #2c7cb0;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: transform .15s, box-shadow .2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .msg {
      margin-top: 16px; padding: 10px 14px; border-radius: 4px;
      font-size: 14px; display: none;
    }
    .msg.error { display: block; background: #fff0f0; color: #d63031; border: 1px solid #fab1b1; }
    .msg.success { display: block; background: #f0fff4; color: #27ae60; border: 1px solid #b2f2bb; }
    .msg.info { display: block; background: #f0f4ff; color: #2d6be0; border: 1px solid #b2c9f2; }
    .countdown { font-size: 13px; color: #888; margin-top: 4px; }
    .footer { margin-top: 20px; text-align: center; font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <h1>验证码登录</h1>
    <p class="sub">输入邮箱地址，验证码将通过邮件发送</p>
    <div id="msg" class="msg"></div>
    <div class="form-group">
      <label for="email">邮箱地址</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="code">验证码</label>
      <div class="code-row">
        <input id="code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code" />
        <button id="sendBtn" onclick="sendCode()">发送验证码</button>
      </div>
      <div id="countdown" class="countdown"></div>
    </div>
    <button id="loginBtn" class="btn-primary" onclick="verifyCode()">登录</button>
    <div class="footer">Powered by <a href="https://github.com/mayushans/quick-auth" target="_blank">Quick Auth</a></div>
  </div>
  <script>
    const redirect = new URLSearchParams(location.search).get('redirect') || '/';
    let countdown = 0, timer = null;

    // ── 读取 Cookie ──
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    }

    // ── 预填上次登录的邮箱 ──
    const lastEmail = getCookie('last_email');
    if (lastEmail) {
      document.getElementById('email').value = lastEmail;
    }

    function msg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text; el.className = 'msg ' + type;
    }
    function startCountdown(sec) {
      countdown = sec; const btn = document.getElementById('sendBtn');
      const cd = document.getElementById('countdown'); btn.disabled = true;
      clearInterval(timer);
      timer = setInterval(() => {
        countdown--;
        if (countdown <= 0) { clearInterval(timer); btn.disabled = false; cd.textContent = ''; btn.textContent = '发送验证码'; }
        else { cd.textContent = countdown + ' 秒后可重新发送'; btn.textContent = countdown + 's'; }
      }, 1000);
    }
    async function sendCode() {
      const email = document.getElementById('email').value.trim();
      if (!email) { msg('请输入邮箱地址', 'error'); return; }
      document.getElementById('sendBtn').disabled = true;
      try {
        const res = await fetch('/api/send-code', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
        const data = await res.json();
        if (res.ok) { msg('验证码已发送，请查收邮件', 'success'); startCountdown(60); }
        else { msg(data.error||'发送失败', 'error'); document.getElementById('sendBtn').disabled = false; }
      } catch(e) { msg('网络错误，请重试', 'error'); document.getElementById('sendBtn').disabled = false; }
    }
    async function verifyCode() {
      const email = document.getElementById('email').value.trim();
      const code = document.getElementById('code').value.trim();
      if (!email) { msg('请输入邮箱地址', 'error'); return; }
      if (!code) { msg('请输入验证码', 'error'); return; }
      document.getElementById('loginBtn').disabled = true;
      try {
        const res = await fetch('/api/verify-code', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,code}) });
        const data = await res.json();
        if (res.ok) { msg('登录成功，正在跳转…', 'success'); setTimeout(()=>{location.href=redirect},800); }
        else { msg(data.error||'验证失败', 'error'); document.getElementById('loginBtn').disabled = false; }
      } catch(e) { msg('网络错误，请重试', 'error'); document.getElementById('loginBtn').disabled = false; }
    }
    document.getElementById('code').addEventListener('keydown', e => { if(e.key==='Enter') verifyCode(); });
  </script>
</body>
</html>
