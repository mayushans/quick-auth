# ── 基于邮箱的访问控制 ──
# 配合 auth_request 使用，限制只有特定邮箱才能访问某些路径。

# ── 白名单映射 ──
# 修改此处添加允许的邮箱，map 在 http 块中定义，多个 server 可共用
map $user_email $acl_email_access {
    default                    0;   # 默认拒绝
    "admin@example.com"        1;   # 允许
    "user@example.com"         1;   # 允许
    "313652730@qq.com"         1;   # 允许
}

